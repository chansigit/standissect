<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>standissect review</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- Plotly from CDN (your browser loads it; works over an SSH tunnel / ngrok).
       To run fully offline, drop plotly-2.35.2.min.js into webreview_static/ and
       point this src at /static/plotly.min.js. -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
  <header id="topbar">
    <span class="brand">standissect<span class="brand-dim">·review</span></span>
    <span id="runroot" class="runroot"></span>
    <span class="spacer"></span>
    <div class="progwrap" title="minors decided">
      <span id="progtext" class="progtext"></span>
      <div class="progbar"><div id="progfill" class="progfill"></div></div>
    </div>
  </header>

  <div id="layout">
    <nav id="sidebar"></nav>
    <main id="main"><div id="clusterbox"></div></main>
  </div>

  <aside id="selpanel" hidden>
    <div class="sel-head">
      <span class="sel-title">Lasso selection</span>
      <span id="selcount" class="sel-count"></span>
      <button class="sel-x" onclick="closeSel()" aria-label="close">×</button>
    </div>
    <div id="selstats" class="sel-stats"></div>
    <div class="sel-actions">
      <button class="btn ghost" onclick="exportSel()">Export barcodes</button>
      <button class="btn discard" onclick="manualSel('DISCARD')">Manual discard</button>
      <button class="btn keep" onclick="manualSel('KEEP')">Manual keep</button>
    </div>
    <div id="degbox" class="sel-deg" hidden>
      <div class="deg-slots">
        <button class="btn ghost" onclick="setDegGroup('a')">Set as A</button>
        <span id="degAchip" class="deg-chip">A —</span>
        <button class="btn ghost" onclick="setDegGroup('b')">Set as B</button>
        <span id="degBchip" class="deg-chip">B —</span>
        <button id="degRun" class="btn deg" onclick="computeDeg()" disabled>DEG&nbsp;A vs B</button>
      </div>
      <div id="degResult" class="deg-result"></div>
    </div>
  </aside>

  <div id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
